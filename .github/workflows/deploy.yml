name: 🚀 OpenBox CI/CD - Maximum Security

on:
push:
branches: [ main ]
paths-ignore:
- '.md'
- 'docs/'
pull_request:
branches: [ main ]
schedule:
- cron: '0 2 * * *'  # Daily backup at 2 AM
- cron: '0 6 * * *'  # Daily security scan at 6 AM
- cron: '0 12 * * *' # Daily vulnerability scan at 12 PM
workflow_dispatch:

env:
NORTHFLANK_TOKEN: ${{ secrets.NORTHFLANK_TOKEN }}
  DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
OPENBOX_VERSION: "2.0.0"

jobs:

==========================================

1. DEEP SECURITY SCAN

==========================================

deep-security-scan:
name: 🔒 Deep Security Scan
runs-on: ubuntu-latest
timeout-minutes: 30
steps:
- name: Checkout code
uses: actions/checkout@v4

==========================================

2. CODE QUALITY

==========================================

code-quality:
name: 📊 Code Quality
runs-on: ubuntu-latest
needs: deep-security-scan
steps:
- name: Checkout code
uses: actions/checkout@v4

==========================================

3. DEPLOY TO NORTHFLANK

==========================================

deploy:
name: 🚀 Deploy to Northflank
needs: [deep-security-scan, code-quality]
runs-on: ubuntu-latest
if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

==========================================

4. DAILY BACKUP

==========================================

backup:
name: 💾 Daily Backup
runs-on: ubuntu-latest
if: github.event_name == 'schedule'
needs: deploy

==========================================

5. DEPENDABOT AUTO-MERGE

==========================================

dependabot-auto-merge:
name: 🤖 Dependabot Auto-Merge
runs-on: ubuntu-latest
if: github.actor == 'dependabot[bot]'
steps:
- name: Checkout
uses: actions/checkout@v4

