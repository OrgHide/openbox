name: 🔄 Self-Healing OpenBox

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  health-check:
    name: 🏥 Health Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Check Northflank Status
        run: |
          echo "🔍 Checking Northflank service status..."
          curl -f -s -o /dev/null -w "HTTP: %{http_code}\n" \
            https://close--openbox--qqx4cl8p8yz9.code.run/api/public/settings || {
            echo "⚠️ Service unhealthy! Triggering redeploy..."
            exit 1
          }
      
      - name: Trigger Redeploy if Unhealthy
        if: failure()
        env:
          NORTHFLANK_TOKEN: ${{ secrets.NORTHFLANK_TOKEN }}
        run: |
          echo "🔄 Triggering Northflank redeploy..."
          curl -X POST \
            -H "Authorization: Bearer $NORTHFLANK_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"service":"openbox"}' \
            https://api.northflank.com/v1/deploy

  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          security-checks: vuln,config,secret
          format: sarif
          output: trivy-results.sarif
      
      - name: Upload Security Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  backup:
    name: 💾 Auto-Backup
    runs-on: ubuntu-latest
    needs: health-check
    if: success()
    steps:
      - uses: actions/checkout@v4
      
      - name: Create Config Backup
        run: |
          mkdir -p backup
          cp -r configs/ backup/
          cp -r scripts/ backup/
          tar -czf backup_$(date +%Y%m%d_%H%M%S).tar.gz backup/
          echo "✅ Backup created"
      
      - name: Upload Backup Artifact
        uses: actions/upload-artifact@v7
        with:
          name: openbox-backup-${{ github.run_id }}
          path: backup_*.tar.gz
          retention-days: 7

  auto-fix:
    name: 🛠️ Auto-Fix
    runs-on: ubuntu-latest
    needs: health-check
    if: failure()
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Auto-Fixer
        run: |
          echo "🛠️ Running auto-fixer..."
          
          # Check and fix Dockerfile
          if ! grep -q "alist-linux-arm64" Dockerfile; then
            echo "⚠️ Fixing Dockerfile architecture..."
            sed -i 's/alist-linux-amd64/alist-linux-arm64/g' Dockerfile
          fi
          
          # Check and fix port
          if ! grep -q "2232" configs/config.json; then
            echo "⚠️ Fixing port configuration..."
            sed -i 's/"port": .*/"port": 2232,/g' configs/config.json
          fi
          
          # Commit fixes
          git config user.name "OpenBox Bot"
          git config user.email "bot@openbox.host"
          git add .
          git commit -m "🛠️ Auto-fix: ${GITHUB_ACTOR} triggered auto-healing" || echo "No changes needed"
          git push
      
      - name: Redeploy after Fix
        env:
          NORTHFLANK_TOKEN: ${{ secrets.NORTHFLANK_TOKEN }}
        run: |
          echo "🚀 Redeploying after auto-fix..."
          curl -X POST \
            -H "Authorization: Bearer $NORTHFLANK_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"service":"openbox"}' \
            https://api.northflank.com/v1/deploy
