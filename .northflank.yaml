# Northflank Build Configuration
build:
  type: dockerfile
  dockerfile: Dockerfile
  context: .
  build_args:
    - OPENBOX_VERSION=2.0.0
    - SECURITY_LEVEL=maximum

deploy:
  replicas: 1
  ports:
    - port: 2232
      protocol: HTTP
      public: true
      name: webui
    - port: 5244
      protocol: TCP
      public: false
      name: internal
  
  environment:
    - OPENBOX_VERSION=2.0.0
    - SECURITY_LEVEL=maximum
    - ALIST_PORT=2232
    - OPENLIST_PORT=2232
  
  health_checks:
    - path: /api/public/settings
      port: 2232
      interval: 30
      timeout: 5
