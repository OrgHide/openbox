# Northflank Configuration
build:
  type: dockerfile
  dockerfile: Dockerfile
  context: .

deploy:
  replicas: 1
  ports:
    - port: 2232
      protocol: HTTP
      public: true
      name: webui
  environment:
    - ALIST_PORT=2232
    - OPENLIST_PORT=2232
    - ALIST_CONFIG=/opt/openbox/configs/config.json
    - OPENLIST_CONFIG=/opt/openbox/configs/config.json
  health_checks:
    - path: /api/public/settings
      port: 2232
      interval: 30
      timeout: 5
      unhealthy_threshold: 3
      healthy_threshold: 2
  resources:
    cpu: 0.1
    memory: 256Mi
  logging:
    level: info
    retention: 30d
