# ==========================================
# SECURE STORAGE WAREHOUSE CONFIG
# ==========================================

[gdrive1]
type = drive
scope = drive
root_folder_id =

[gdrive2]
type = drive
scope = drive
root_folder_id =

[gdrive3]
type = drive
scope = drive
root_folder_id =

[dropbox1]
type = dropbox

[onedrive1]
type = onedrive

# ==========================================
# MAIN WAREHOUSE - ALL CLOUDS COMBINED
# ==========================================

[warehouse]
type = union
upstreams = gdrive1:/ gdrive2:/ gdrive3:/ dropbox1:/ onedrive1:/
create_policy = mfs
search_policy = all
action_policy = all
cache_time = 60

# ==========================================
# SECURE BACKUP WAREHOUSE
# ==========================================

[warehouse-backup]
type = union
upstreams = gdrive1:/ gdrive2:/ gdrive3:/
create_policy = mfs
